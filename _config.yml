title: dk-tech-notes
description: 엔지니어링 노트
baseurl: "/dk-tech-notes"
url: "https://dkGithup2022.github.io"

remote_theme: just-the-docs/just-the-docs

color_scheme: light

# Search
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

# Aux nav (top-right links)
aux_links:
  GitHub: "https://github.com/dkGithup2022/dk-tech-notes"
aux_links_new_tab: true

back_to_top: true
back_to_top_text: "Back to top"

heading_anchors: true

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - README.md
